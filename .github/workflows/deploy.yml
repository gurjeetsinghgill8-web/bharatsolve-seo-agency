# BHARATSOLVE SEO AGENCY — Auto Deploy to Streamlit Cloud
# Triggers on push to main branch
name: Deploy to Streamlit Cloud

on:
  push:
    branches: [main]
  workflow_dispatch:  # Manual trigger

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🔍 Verify app imports
        run: |
          python -c "
import sys
sys.path.insert(0, '.')
from db.schema import init_db
from utils.llm_client import call_llm, get_api_key
from utils.social_connectors import get_connector, get_available_platforms
from agents.social_agent import create_social_post
from agents.email_agent import send_email
print('✅ All imports verified successfully!')
          "

      - name: 🚀 Deploy to Streamlit Cloud
        run: |
          echo "✅ Ready for deployment"
          echo "📱 App is configured for Streamlit Cloud"
          echo "🔑 Set secrets in Streamlit Cloud dashboard"
          echo ""
          echo "Manual deploy:"
          echo "  1. Go to https://share.streamlit.io"
          echo "  2. Connect your GitHub repo"
          echo "  3. Set secrets (GROQ_API_KEY, GEMINI_API_KEY, etc.)"
          echo "  4. Deploy!"
